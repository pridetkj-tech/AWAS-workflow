version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: awas-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - ./n8n-data:/home/node/.n8n
      - ./awas-workflow.json:/home/node/.n8n/workflows/awas-workflow.json
    command: n8n start
